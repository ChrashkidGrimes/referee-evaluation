name: Deploy main to Pages root

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages

          # Dateien nach /tmp kopieren
          mkdir /tmp/deploy-main
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='integration' \
            ./ /tmp/deploy-main/

          # gh-pages auschecken
          git checkout gh-pages

          # Alte Dateien löschen (außer integration-Ordner)
          find . -maxdepth 1 \
            ! -name '.git' \
            ! -name 'integration' \
            ! -name '.' \
            -exec rm -rf {} +

          # Neue Dateien kopieren
          cp -r /tmp/deploy-main/. .

          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Deploy main @ ${{ github.sha }}"
          git push origin gh-pages
