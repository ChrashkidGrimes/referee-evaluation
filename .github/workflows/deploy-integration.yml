name: Deploy integration to Pages /integration/

on:
  push:
    branches:
      - integration

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration
        uses: actions/checkout@v4
        with:
          ref: integration
          fetch-depth: 0

      - name: Deploy to gh-pages /integration/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages

          # Dateien nach /tmp kopieren
          mkdir /tmp/deploy-integration
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            ./ /tmp/deploy-integration/

          # gh-pages auschecken
          git checkout gh-pages

          # integration-Ordner leeren und neu befüllen
          rm -rf integration
          mkdir integration
          cp -r /tmp/deploy-integration/. integration/

          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Deploy integration @ ${{ github.sha }}"
          git push origin gh-pages
